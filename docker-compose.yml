services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build: ./user-service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: mysql+pymysql://appuser:apppass@mysql:3306/appdb
      SECRET_KEY: local-dev-secret-change-in-prod
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      ALLOWED_ORIGINS: "http://localhost:3000"
      PORT: "8001"
    depends_on:
      mysql:
        condition: service_healthy

  project-service:
    build: ./project-service
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: mysql+pymysql://appuser:apppass@mysql:3306/appdb
      SECRET_KEY: local-dev-secret-change-in-prod
      ALGORITHM: HS256
      ALLOWED_ORIGINS: "http://localhost:3000"
      PORT: "8002"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - user-service
      - project-service

volumes:
  mysql_data:
